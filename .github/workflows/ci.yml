name: OpenDesign CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  client-build:
    name: Client Build Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: 'client/package-lock.json'
    - name: Install dependencies
      working-directory: ./client
      run: npm install
    - name: Build frontend
      working-directory: ./client
      run: npm run build

  server-core-build:
    name: Java Server Build Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      working-directory: ./server-core
      run: mvn -B package --file pom.xml -DskipTests

  server-ai-check:
    name: Python AI Bridge Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      working-directory: ./server-ai
      run: pip install -r requirements.txt
    - name: Syntax Check
      working-directory: ./server-ai
      run: python -m py_compile main.py
