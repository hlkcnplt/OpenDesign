version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: opendesign-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-opendesign}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  server-core:
    build:
      context: ./server-core
      dockerfile: Dockerfile
    container_name: opendesign-server-core
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-opendesign}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - AI_SERVICE_URL=http://server-ai:8000
    depends_on:
      - postgres
      - server-ai
    restart: unless-stopped

  server-ai:
    build:
      context: ./server-ai
      dockerfile: Dockerfile
    container_name: opendesign-server-ai
    ports:
      - "8000:8000"
    environment:
      - AI_PROVIDER=${AI_PROVIDER:-LOCAL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: opendesign-client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - server-core
    restart: unless-stopped

volumes:
  postgres_data:
