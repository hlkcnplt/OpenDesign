version: '3.8'

services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: []
    restart: always

  server-ai:
    ports: []
    restart: always

  server-core:
    ports: []
    restart: always

  client:
    build:
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    ports: []
    restart: always

  nginx-gateway:
    image: nginx:alpine
    container_name: opendesign-gateway
    ports:
      - "80:80"
    volumes:
      - ./infra/docker/nginx-gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server-core
      - server-ai
    restart: always
